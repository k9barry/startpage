---
# -----------------------------------------------------------------------------
# Dashy — JAFCP Start Page
# -----------------------------------------------------------------------------
# First-time setup:
#   cp conf.private.example.yml conf.private.yml
#   # edit conf.private.yml with your internal-only items
#   docker compose up -d
#
# Update:
#   docker compose pull && docker compose up -d
# -----------------------------------------------------------------------------

services:
  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    hostname: startpage
    restart: unless-stopped
    ports:
      - "4000:8080"
    volumes:
      - ./user-data:/app/user-data
      # Public config — tracked in git.
      - ./conf.yml:/app/user-data/conf.yml
      # Private config — .gitignore'd. MUST exist before first run; create it
      # from conf.private.example.yml or Docker will mount an empty directory
      # in its place and Dashy's "Internal" page will fail to load.
      - ./conf.private.yml:/app/user-data/conf.private.yml
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck"]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s

# -----------------------------------------------------------------------------

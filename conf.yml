---
# =============================================================================
# JAFCP Start Page — PUBLIC CONFIG (safe to commit)
# =============================================================================
# This file contains only:
#   * cleaver.me personal homelab (public DNS, owner's choice to expose)
#   * public vendor SaaS portals (Motorola, AT&T, Tyler SaaS, state of IN, etc.)
#   * public-facing agency pages
#
# Internal hosts (RFC1918 IPs, *.madison.local, bare hostnames, Tyler New World
# production hosts) live in conf.private.yml, which is .gitignore'd.
#
# To enable the Internal page:
#   cp conf.private.example.yml conf.private.yml
#   # edit conf.private.yml with your site-specific items
#   docker compose restart
# =============================================================================

pageInfo:
  title: JAFCP Start Page
  description: Madison County Dispatch & Homelab
  navLinks:
    - title: GitHub
      path: https://github.com/k9barry/startpage
    - title: Dashy Docs
      path: https://dashy.to/docs

# -----------------------------------------------------------------------------
# Multi-page setup. The "Internal" page loads from conf.private.yml, which is
# gitignored and bind-mounted into /app/user-data/ by docker-compose.yml. The
# compose mount is strict (create_host_path: false), so the file is guaranteed
# to exist at runtime or the container won't start — see docker-compose.yml.
#
# For a public-only deploy with no internal links, delete both this `pages:`
# block AND the conf.private.yml mount in docker-compose.yml.
# -----------------------------------------------------------------------------
pages:
  - name: Internal
    path: conf.private.yml

appConfig:
  theme: nord-frost
  layout: auto
  iconSize: medium
  language: en
  defaultOpeningMethod: newtab
  statusCheck: true
  statusCheckInterval: 0
  faviconApi: allesedv
  preventWriteToDisk: false
  preventLocalSave: false
  enableErrorReporting: false
  routingMode: history
  disableUpdateChecks: false

